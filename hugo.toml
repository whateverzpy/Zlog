baseURL = 'https://whateverz.top/'
languageCode = 'zh-CN'
title = 'WhateverZ'
theme = "hugo-theme-stack"
hasCJKLanguage = true
defaultContentLanguage = "zh-cn"
enableRobotsTXT = true
enableEmoji = true

[Params]
  favicon = "/favicon.svg"

[Params.DateFormat]
  published = "2006-01-02"
  lastUpdated = "2006-01-02 15:04 -07:00"

[Params.widgets]
  page = [
    {type = "toc"},
  ]
  homepage = [
    {type = "search"},
    {type = "tag-cloud"},
    {type = "categories"}
  ]

[Params.Sidebar]
  avatar = { src = "/avatar.png" }
  emoji = "😪"
  subtitle = "Zlog"

[Params.Footer]
  since = 2024
  customText = "L'amor che move il sole e l'altre stelle."

[Params.Article]
  math = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions.passthrough]
      enable = true
      delimiters.block = [
        ["\\[", "\\]"],
        ["$$", "$$"]
      ]
      delimiters.inline = [
        ["\\(", "\\)"],
        ["$", "$"]
      ]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
  [markup.highlight]
    noClasses = false

[languages.zh-cn.params]
  reading_speed = 300

[menu]
  [[menu.social]]
    identifier = "github"
    name = "GitHub"
    url = "https://github.com/whateverzpy"
    [menu.social.params]
      icon = "brand-github"
  [[menu.social]]
    identifier = "rss"
    name = "RSS"
    url = "/index.xml"
    [menu.social.params]
      icon = "rss"


[outputs]
  home = ["html", "rss"]
  section = ["html", "rss"]

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[related]
  includeNewer = true
  threshold = 80
  toLower = false
  [[related.indices]]
    applyFilter = false
    cardinalityThreshold = 0
    name = 'keywords'
    pattern = ''
    toLower = false
    type = 'basic'
    weight = 100
  [[related.indices]]
    applyFilter = false
    cardinalityThreshold = 0
    name = 'date'
    pattern = ''
    toLower = false
    type = 'basic'
    weight = 10
  [[related.indices]]
    applyFilter = false
    cardinalityThreshold = 0
    name = 'tags'
    pattern = ''
    toLower = false
    type = 'basic'
    weight = 80